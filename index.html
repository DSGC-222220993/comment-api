<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comment Wall</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Comment Wall</h1>

    <div class="form">
      <input type="text" id="username" placeholder="Tu nombre">
      <textarea id="message" placeholder="Escribe un comentario..."></textarea>
      <button id="btnPost">Publicar</button>
    </div>

    <div id="commentsContainer" class="comments">
      <p id="emptyMsg">No hay comentarios aún</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
